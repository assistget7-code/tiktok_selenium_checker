services:
  - type: web
    name: tiktok-lamatok-checker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: LAMATOK_API_KEY
        value: YOUR_LAMATOK_API_KEY
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SESSION_SECRET
        value: dev-secret-key
