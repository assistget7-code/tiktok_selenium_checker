services:
  - type: web
    name: tiktok-selenium-checker
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn app:app
    envVars:
      - key: ADMIN_PASSWORD
        value: admin123
      - key: SESSION_SECRET
        value: dev-secret-key
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RENDER
        value: true
